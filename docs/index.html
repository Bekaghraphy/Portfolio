<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Montserrat;
background:black;
color:white;
overflow:hidden;
}

/* NAV */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:22px;
padding:16px;
z-index:20;

background:rgba(0,0,0,.5);
backdrop-filter:blur(10px);

overflow-x:auto;
white-space:nowrap;
}

nav a{
flex-shrink:0;
color:white;
text-decoration:none;
font-size:12px;
letter-spacing:1px;
opacity:.8;
}

nav a:hover{
color:#d8b97a;
}

/* HERO */

.hero{
height:100vh;
display:flex;
align-items:center;
padding:0 8%;
position:relative;
}

/* VIDEO */

.hero video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
top:0;
left:0;
z-index:-2;
}

/* OVERLAY */

.overlay{
position:absolute;
inset:0;
background:linear-gradient(90deg,rgba(0,0,0,.85),rgba(0,0,0,.3));
z-index:-1;
}

/* CONTENT */

.hero-content{
max-width:550px;
}

.hero h1{
font-size:42px;
color:#d8b97a;
margin-bottom:12px;
}

.hero h2{
font-size:15px;
letter-spacing:3px;
margin-bottom:18px;
}

.hero p{
font-size:14px;
line-height:1.6;
margin-bottom:25px;
}

/* BUTTON */

.download-btn{
padding:12px 18px;
border-radius:8px;
background:#d8b97a;
color:black;
text-decoration:none;
font-weight:600;
}

/* SOCIAL */

.social{
margin-top:25px;
display:flex;
gap:14px;
align-items:center;
}

.social a img{
width:22px;
}

/* FOOTER */

.footer{
position:absolute;
bottom:0;
width:100%;
text-align:center;
padding:12px;
font-size:12px;
background:linear-gradient(to top,rgba(0,0,0,.6),transparent);
}

</style>

</head>

<body>

<script>

/* ✅ فيديوهات شغالة على iPhone */

const videos = [
"https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4",
"https://www.w3schools.com/html/mov_bbb.mp4"
]

let i = 0
const video = document.getElementById("bgVideo")

function changeVideo(){

video.src = videos[i]
video.play()

i++
if(i >= videos.length) i = 0

}

/* تغيير كل 6 ثواني */

setInterval(changeVideo, 3000)
changeVideo()

</script>
