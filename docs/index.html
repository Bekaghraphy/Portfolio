<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="img/favicon.png">
<title>Hesham Abdelhamed</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Montserrat;
color:white;
background:black;
overflow-x:hidden;
}

/* NAV */

nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:20px;
padding:16px;
z-index:10;
overflow-x:auto;
white-space:nowrap;
}

nav a{
color:white;
text-decoration:none;
letter-spacing:1px;
font-size:12px;
opacity:.8;
flex-shrink:0;
}

nav a:hover{
color:#d8b97a;
}

/* HERO */

.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:flex-start;
padding:0 20px;
position:relative;
}

.hero video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(
90deg,
rgba(0,0,0,.85),
rgba(0,0,0,.3)
);
z-index:-1;
}

/* CONTENT */

.hero-content{
max-width:600px;
display:flex;
flex-direction:column;
align-items:flex-start;
}

/* TOGGLE */

.lang-toggle{
margin-bottom:15px;
display:inline-flex;
border:1px solid rgba(216,185,122,.6);
border-radius:8px;
overflow:hidden;
background:rgba(0,0,0,.25);
}

.lang-btn{
padding:6px 10px;
border:none;
background:transparent;
color:#d8b97a;
font-size:11px;
cursor:pointer;
}

.lang-btn.active{
background:#d8b97a;
color:black;
}

/* TEXT */

.hero h1{
font-size:34px;
color:#d8b97a;
margin-bottom:12px;
}

.hero h2{
font-size:14px;
letter-spacing:2px;
margin-bottom:15px;
}

.hero p{
font-size:14px;
line-height:1.6;
margin-bottom:25px;
}

/* BUTTON */

.download-btn{
display:inline-flex;
align-items:center;
padding:12px 18px;
border-radius:8px;
text-decoration:none;
background:linear-gradient(
135deg,
rgba(216,185,122,.95),
rgba(216,185,122,.5)
);
color:black;
font-weight:600;
font-size:13px;
box-shadow:0 0 20px rgba(216,185,122,.5);
}

/* SOCIAL */

.social{
margin-top:25px;
display:flex;
gap:12px;
flex-wrap:wrap;
}

.social a img{
width:20px;
opacity:.9;
}

/* FOOTER */

.site-footer{
width:100%;
padding:30px 20px;
text-align:center;
font-size:11px;
color:rgba(255,255,255,0.5);
border-top:1px solid rgba(255,255,255,0.08);
}

</style>

</head>

<body>

<nav>
<a href="index.html">HOME</a>
<a href="my-work.html">MY WORK</a>
<a href="ai-motion.html">AI & ANIMATION</a>
<a href="academy.html">PRO</a>
<a href="show.html">SHOWREEL</a>
</nav>

<div class="hero">

<video autoplay muted loop playsinline>
<source src="img/5.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="hero-content">

<div class="lang-toggle">
<button class="lang-btn active" onclick="setLang('en')">EN</button>
<button class="lang-btn" onclick="setLang('ar')">AR</button>
</div>

<h1 id="title">Hesham Abdelhamed</h1>

<h2 id="subtitle">
Cinematic Documentary Storytelling
</h2>

<p id="desc">
I am a filmmaker and video editor crafting cinematic narratives,
mixing documentary sensitivity with strong visual composition.
</p>

<a href="img/Hesham-Abdelhamed-Portfolio.pdf" download class="download-btn">
⬇ Download Portfolio
</a>

<div class="social">

<a href="https://www.linkedin.com/in/hishamabdelhamed" target="_blank">
<img src="img/linkedin.png">
</a>

<a href="https://www.instagram.com/hisham.abdelhamed" target="_blank">
<img src="img/instagram.png">
</a>

<a href="https://www.tiktok.com/@hisham.abdelhamed" target="_blank">
<img src="img/tiktok.png">
</a>

<a href="https://facebook.com/hishamabdelhamedd" target="_blank">
<img src="img/facebook.png">
</a>

<a href="mailto:per.hisham@gmail.com">
<img src="img/email.png">
</a>

</div>

</div>

</div>

<footer class="site-footer">
© 2026 Hesham Abdelhamed — All Rights Reserved
</footer>

<script>

function setLang(lang){

const hero = document.querySelector(".hero")
const title = document.getElementById("title")
const subtitle = document.getElementById("subtitle")
const desc = document.getElementById("desc")
const buttons = document.querySelectorAll(".lang-btn")

buttons.forEach(btn => btn.classList.remove("active"))

if(lang === "ar"){

document.body.dir = "rtl"
hero.style.justifyContent = "flex-end"

title.innerHTML = "هشام عبد الحميد"
subtitle.innerHTML = "قصص واقعية بروح سينمائية"

desc.innerHTML =
"أنا صانع أفلام ومونتير فيديو أصنع قصصًا بصرية سينمائية تجمع بين الحس الوثائقي والتكوين البصري القوي."

buttons[1].classList.add("active")

}else{

document.body.dir = "ltr"
hero.style.justifyContent = "flex-start"

title.innerHTML = "Hesham Abdelhamed"
subtitle.innerHTML = "Cinematic Documentary Storytelling"

desc.innerHTML =
"I am a filmmaker and video editor crafting cinematic narratives, mixing documentary sensitivity with strong visual composition."

buttons[0].classList.add("active")

}

}

</script>

</body>
</html>
