<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hesham Abdelhamed</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Montserrat;
color:white;
background:black;

}

/* NAV */

nav{

position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:30px;
padding:22px;
z-index:10;

}

nav a{

color:white;
text-decoration:none;
letter-spacing:2px;
font-size:13px;
opacity:.8;

}

nav a:hover{

color:#d8b97a;

}

/* HERO */

.hero{

height:100vh;
display:flex;
align-items:center;

padding-left:10%;
padding-right:10%;

position:relative;

}

.hero video{

position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;

}

.overlay{

position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background:linear-gradient(
90deg,
rgba(0,0,0,.8),
rgba(0,0,0,.3)
);

z-index:-1;

}

/* CONTENT */

.hero-content{

max-width:650px;

}

.hero h1{

font-size:64px;
color:#d8b97a;
margin-bottom:15px;

}

.hero h2{

font-size:20px;
letter-spacing:5px;
margin-bottom:20px;

}

.hero p{

line-height:1.7;
opacity:.9;
margin-bottom:30px;

}

/* DOWNLOAD BUTTON */

.download-btn{

display:inline-flex;
align-items:center;
gap:12px;

padding:16px 28px;

border-radius:8px;

text-decoration:none;

background:linear-gradient(
135deg,
rgba(216,185,122,.9),
rgba(216,185,122,.4)
);

color:black;

font-weight:600;

letter-spacing:1px;

box-shadow:

0 0 25px rgba(216,185,122,.5);

transition:.35s;

}

.download-btn:hover{

transform:translateY(-3px);

box-shadow:

0 0 45px rgba(216,185,122,.9);

}

/* LIGHT SWEEP */

.download-btn::before{

content:"";

position:absolute;

width:60px;
height:200%;

background:rgba(255,255,255,.4);

transform:rotate(25deg);

left:-80px;

transition:.7s;

}

.download-btn:hover::before{

left:120%;

}

/* SOCIAL */

.social{

margin-top:35px;
display:flex;
gap:14px;

}

.social img{

width:22px;
opacity:.8;

}

.social img:hover{

opacity:1;

}

/* LANGUAGE TOGGLE */

.lang-toggle{

position:absolute;
top:80px;
right:10%;

display:flex;
gap:10px;

}

.lang-toggle button{

padding:6px 12px;

border:none;

background:#d8b97a;

cursor:pointer;

font-size:12px;

}

</style>

</head>

<body>


<nav>

<a href="#">HOME</a>
<a href="#">MY WORK</a>
<a href="#">AI & ANIMATION</a>
<a href="#">PRO</a>
<a href="#">SHOWREEL</a>

</nav>


<div class="hero">

<video autoplay muted loop>
<source src="img/5.mp4" type="video/mp4">
</video>

<div class="overlay"></div>


<div class="hero-content">

<h1 id="title">Hesham Abdelhamed</h1>

<h2 id="subtitle">
CINEMATIC VISUAL STORIES
</h2>

<p id="desc">

I am a filmmaker and video editor crafting cinematic narratives, mixing documentary sensitivity with strong visual composition.

</p>


<a href="img/Hesham-Abdelhamed-Portfolio.pdf"
download
class="download-btn">

⬇ Download Portfolio

</a>


<div class="social">

<img src="img/linkedin.png">
<img src="img/instagram.png">
<img src="img/tiktok.png">
<img src="img/facebook.png">
<img src="img/email.png">

</div>

</div>


<div class="lang-toggle">

<button onclick="setLang('en')">EN</button>
<button onclick="setLang('ar')">AR</button>

</div>

</div>


<script>

function setLang(lang){

if(lang=="ar"){

document.body.dir="rtl"

document.getElementById("subtitle").innerHTML="قصص بصرية سينمائية"

document.getElementById("desc").innerHTML=
"أنا صانع أفلام ومونتير فيديو أصنع قصصًا بصرية سينمائية تجمع بين الحس الوثائقي والتكوين البصري القوي."

}

else{

document.body.dir="ltr"

document.getElementById("subtitle").innerHTML="CINEMATIC VISUAL STORIES"

document.getElementById("desc").innerHTML=
"I am a filmmaker and video editor crafting cinematic narratives, mixing documentary sensitivity with strong visual composition."

}

}

</script>

</body>

</html>
