<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Montserrat;
color:white;
background:black;
overflow-x:hidden;
}

/* NAV */

nav{

position:fixed;
top:0;
width:100%;

display:flex;
justify-content:center;
gap:30px;

padding:22px;

z-index:10;

}

nav a{

color:white;
text-decoration:none;
letter-spacing:2px;
font-size:13px;
opacity:.8;

}

nav a:hover{
color:#d8b97a;
}

/* HERO */

.hero{

height:100vh;

display:flex;
align-items:center;

padding-left:10%;
padding-right:10%;

position:relative;

}

.hero video{

position:absolute;
top:0;
left:0;

width:100%;
height:100%;

object-fit:cover;

z-index:-2;

}

.overlay{

position:absolute;
top:0;
left:0;

width:100%;
height:100%;

background:linear-gradient(
90deg,
rgba(0,0,0,.85),
rgba(0,0,0,.25)
);

z-index:-1;

}

/* CONTENT */

.hero-content{

max-width:650px;

}

.hero h1{

font-size:64px;
color:#d8b97a;

margin-bottom:15px;

}

.hero h2{

font-size:20px;
letter-spacing:5px;

margin-bottom:20px;

}

.hero p{

line-height:1.7;
opacity:.9;

margin-bottom:30px;

}

/* DOWNLOAD BUTTON */

.download-btn{

display:inline-flex;
align-items:center;

padding:15px 28px;

border-radius:8px;

text-decoration:none;

background:linear-gradient(
135deg,
rgba(216,185,122,.95),
rgba(216,185,122,.5)
);

color:black;

font-weight:600;
letter-spacing:1px;

box-shadow:0 0 25px rgba(216,185,122,.5);

transition:.25s;

}

.download-btn:hover{

transform:translateY(-2px);

box-shadow:0 0 35px rgba(216,185,122,.8);

}

/* SOCIAL */

.social{

margin-top:35px;

display:flex;
gap:16px;

}

.social a img{

width:22px;

opacity:.8;

transition:.3s;

}

.social a img:hover{

opacity:1;
transform:scale(1.1);

}

/* LANGUAGE TOGGLE */

.lang-toggle{

position:fixed;

top:20px;
right:40px;

display:flex;

border:1px solid rgba(216,185,122,.6);

border-radius:6px;

overflow:hidden;

background:rgba(0,0,0,.35);

backdrop-filter:blur(10px);

}

.lang-btn{

padding:6px 14px;

border:none;

background:transparent;

color:#d8b97a;

font-size:12px;
letter-spacing:1px;

cursor:pointer;

transition:.3s;

}

.lang-btn:hover{

background:rgba(216,185,122,.15);

}
.hero{
justify-content:flex-start;
}
  /* ================= MOBILE ================= */

@media (max-width:768px){

nav{
gap:18px;
padding:16px;
flex-wrap:wrap;
}

nav a{
font-size:11px;
letter-spacing:1px;
}

.hero{
padding-left:24px;
padding-right:24px;
height:100vh;
align-items:center;
}

.hero-content{
max-width:100%;
}

.hero h1{
font-size:36px;
line-height:1.2;
}

.hero h2{
font-size:14px;
letter-spacing:3px;
}

.hero p{
font-size:14px;
line-height:1.6;
}

.download-btn{
padding:12px 20px;
font-size:13px;
}

.social{
gap:14px;
flex-wrap:wrap;
}

.social a img{
width:20px;
}

/* language toggle */

.lang-toggle{
top:14px;
right:14px;
}

.lang-btn{
padding:6px 10px;
font-size:11px;
}

}
nav{
overflow-x:auto;
white-space:nowrap;
}
  /* ===== FOOTER ===== */

.site-footer{

width:100%;

padding:40px 20px;

margin-top:80px;

text-align:center;

font-size:12px;

letter-spacing:2px;

color:rgba(255,255,255,0.45);

border-top:1px solid rgba(255,255,255,0.08);

}

.footer-content{

max-width:1200px;

margin:auto;

}
</style>

</head>

<button class="lang-btn" onclick="setLang('en')">EN</button>
<button class="lang-btn" onclick="setLang('ar')">AR</button>

</div>


<script>

function setLang(lang){

const hero = document.querySelector(".hero")

if(lang === "ar"){

document.body.dir = "rtl"

hero.style.justifyContent = "flex-end"

document.getElementById("subtitle").innerHTML = "قصص بصرية سينمائية"

document.getElementById("desc").innerHTML =
"أنا صانع أفلام ومونتير فيديو أصنع قصصًا بصرية سينمائية تجمع بين الحس الوثائقي والتكوين البصري القوي."

}

else{

document.body.dir = "ltr"

hero.style.justifyContent = "flex-start"

document.getElementById("subtitle").innerHTML =
"CINEMATIC VISUAL STORIES"

document.getElementById("desc").innerHTML =
"I am a filmmaker and video editor crafting cinematic narratives, mixing documentary sensitivity with strong visual composition."

}

}
</script>
