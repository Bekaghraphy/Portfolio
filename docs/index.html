        /* Updated Local Video Background Implementation */
        .video-background-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
            background: #000;
        }

        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures coverage on all screen sizes/orientations */
            filter: brightness(0.4) contrast(1.1) saturate(0.8);
        }

        .video-overlay-gradient {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%),
                        linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 50%, rgba(0,0,0,0.9) 100%);
            z-index: -1;
            pointer-events: none;
        }
        
        /* Nav Bar Glassmorphism */
        .nav-glass {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* TV Frame Styling */
        .tv-frame {
            border: 18px solid #222;
            border-bottom-width: 35px;
            border-radius: 45px;
            background: #111;
            position: relative;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.8), inset 0 0 40px rgba(0,0,0,1);
        }
        .tv-screen-content {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
        }
        .scanline { 
            width: 100%; 
            height: 4px; 
            background: rgba(255, 255, 255, 0.05); 
            position: absolute; 
            top: 0; 
            left: 0; 
            pointer-events: none;
            animation: scan 6s linear infinite; 
            z-index: 10;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* Premiere Timeline */
        .premiere-bg { background-color: rgba(26, 26, 26, 0.8); backdrop-filter: blur(10px); }
        .premiere-panel { background-color: #232323; border: 1px solid #111; }
        .track-label { width: 55px; background: #353535; border-right: 2px solid #111; font-size: 9px; font-weight: 800; color: #888; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .playhead-line { width: 1px; height: 100%; background: #40a9ff; position: absolute; top: 0; pointer-events: none; z-index: 60; box-shadow: 0 0 10px rgba(64, 169, 255, 0.5); }
        .playhead-head { width: 12px; height: 16px; background: #40a9ff; clip-path: polygon(0% 0%, 100% 0%, 100% 70%, 50% 100%, 0% 70%); position: absolute; top: 0; transform: translateX(-50%); }

        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        .animate-marquee { display: inline-block; animation: marquee 20s linear infinite; }
        
        .ltr { direction: ltr; }

        /* Film Strip Specific Styles */
        .film-strip-container {
            background: rgba(0, 0, 0, 0.5);
            padding: 40px 0;
            overflow-x: hidden;
            position: relative;
        }
        .film-strip {
            display: flex;
            gap: 15px;
            width: max-content;
            animation: film-scroll 80s linear infinite;
        }
        @keyframes film-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .film-frame {
            width: 320px;
            aspect-ratio: 16/9;
            background: #111;
            position: relative;
            border-left: 10px solid #1a1a1a;
            border-right: 10px solid #1a1a1a;
            flex-shrink: 0;
            cursor: pointer;
        }
        .film-frame::before, .film-frame::after {
            content: '';
            position: absolute;
            left: -10px;
            right: -10px;
            height: 20px;
            background-image: radial-gradient(circle, #000 35%, transparent 40%);
            background-size: 20px 20px;
            z-index: 2;
        }
        .film-frame::before { top: 5px; }
        .film-frame::after { bottom: 5px; }
        .film-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
            filter: grayscale(0.5) contrast(1.2);
            transition: all 0.5s ease;
        }
        .film-frame:hover .film-img {
            opacity: 1;
            filter: grayscale(0) contrast(1);
        }

        /* NEW: Contact Section Specific Styles */
        .contact-grid-paper {
            background-image: linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .sketch-font {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
        }
        .pin-red {
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));

            border-radius: 50%;
        }
        .sticky-note {
            box-shadow: 2px 5px 15px rgba(0,0,0,0.6);
            transform: rotate(-2deg);
        }
        .floating-image {
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.8));
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
        }

        /* Cinematic Background Elements */
        .studio-lights-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('276dc366b2e06605263a41d5b50333c4.jpg');
            background-size: cover;
            background-position: top center;
            opacity: 0.15;
            mix-blend-mode: screen;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes light-drift {
            0%, 100% { transform: translateY(0) scale(1.0); }
            50% { transform: translateY(-10px) scale(1.02); }
        }
        .animate-light-drift {
            animation: light-drift 10s ease-in-out infinite;
        }
        /* Interactive cinematic enhancements */
        .interactive-shell {
            position: relative;
            isolation: isolate;
        }
        .cursor-spotlight {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            background: radial-gradient(360px circle at var(--mx, 50%) var(--my, 30%), rgba(216,185,122,0.14), transparent 42%);
            mix-blend-mode: screen;
        }
        .grain-layer {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.12;
            background-image: linear-gradient(115deg, rgba(255,255,255,.08), transparent 18%, rgba(255,255,255,.04) 32%, transparent 54%);
            background-size: 180px 180px;
            animation: grain-shift 9s steps(6) infinite;
        }
        @keyframes grain-shift {
            0% { transform: translate3d(0,0,0); }
            25% { transform: translate3d(-3%,2%,0); }
            50% { transform: translate3d(2%,-3%,0); }
            75% { transform: translate3d(3%,3%,0); }
            100% { transform: translate3d(0,0,0); }
        }
        .nav-link {
            position: relative;
            padding-bottom: 6px;
        }
        .nav-link::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 1px;
            background: #d8b97a;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform .35s ease;
        }
        .nav-link:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }
        .hero-icon-orbit {
            animation: orbit-float 5s ease-in-out infinite;
        }
        .hero-icon-orbit:nth-child(2) { animation-delay: .35s; }
        .hero-icon-orbit:nth-child(3) { animation-delay: .7s; }
        .hero-icon-orbit:nth-child(4) { animation-delay: 1.05s; }
        .hero-icon-orbit:nth-child(5) { animation-delay: 1.4s; }
        @keyframes orbit-float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(2deg); }
        }
        .magnetic-icon {
            transition: transform .3s ease, box-shadow .3s ease, border-color .3s ease, background .3s ease;
        }
        .magnetic-icon:hover {
            transform: translateY(-6px) scale(1.04);
            border-color: rgba(216,185,122,.7);
            box-shadow: 0 18px 45px rgba(216,185,122,.15);
        }
        .timeline-clip {
            overflow: hidden;
        }
        .timeline-clip::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.06), transparent);
            transform: translateX(-100%);
            animation: clip-sheen 5s ease-in-out infinite;
            pointer-events: none;
            z-index: 15;
        }
        @keyframes clip-sheen {
            0%, 35% { transform: translateX(-100%); }
            55%, 100% { transform: translateX(100%); }
        }
        .film-strip:hover {
            animation-play-state: paused;
        }
        .play-badge {
            box-shadow: 0 0 0 0 rgba(216,185,122,.45);
            animation: pulse-ring 2s infinite;
        }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(216,185,122,.45); }
            70% { box-shadow: 0 0 0 18px rgba(216,185,122,0); }
            100% { box-shadow: 0 0 0 0 rgba(216,185,122,0); }
        }
        .social-card {
            min-height: 96px;
        }
        .social-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 20%, rgba(255,255,255,.18), transparent 34%);
            opacity: 0;
            transition: opacity .3s ease;
        }
        .social-card:hover::before {
            opacity: 1;
        }
        .section-reveal {
            content-visibility: auto;
            contain-intrinsic-size: 900px;
        }
        .ai-animation-section {
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(circle at 12% 18%, rgba(64,169,255,.18), transparent 28%),
                radial-gradient(circle at 86% 16%, rgba(216,185,122,.16), transparent 26%),
                linear-gradient(135deg, rgba(4,7,12,.98), rgba(13,13,13,.94) 45%, rgba(5,5,5,.98));
        }
        .ai-animation-section::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
            background-size: 58px 58px;
            mask-image: linear-gradient(to bottom, transparent, black 18%, black 82%, transparent);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 18%, black 82%, transparent);
        }
        .ai-orbital-ring {
            position: absolute;
            width: 540px;
            height: 540px;
            border: 1px solid rgba(216,185,122,.16);
            border-radius: 50%;
            right: -160px;
            top: -120px;
            box-shadow: inset 0 0 80px rgba(64,169,255,.08);
            animation: ai-ring 28s linear infinite;
            pointer-events: none;
        }
        .lang-ar .ai-orbital-ring {
            right: auto;
            left: -160px;
        }
        @keyframes ai-ring {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .ai-card {
            border: 1px solid rgba(255,255,255,.1);
            background: rgba(255,255,255,.06);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            transition: transform .35s ease, border-color .35s ease, background .35s ease;
        }
        .ai-card:hover {
            transform: translateY(-8px);
            border-color: rgba(216,185,122,.55);
            background: rgba(255,255,255,.1);
        }
        .ai-preview {
            position: relative;
            aspect-ratio: 16 / 10;
            overflow: hidden;
            background:
                radial-gradient(circle at 24% 24%, rgba(216,185,122,.95), transparent 14%),
                radial-gradient(circle at 78% 32%, rgba(64,169,255,.75), transparent 16%),
                radial-gradient(circle at 54% 78%, rgba(92,58,145,.7), transparent 18%),
                linear-gradient(135deg, #0b1020, #111);
        }
        .ai-preview video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: .72;
            filter: saturate(1.08) contrast(1.08);
            transition: transform .6s ease, opacity .35s ease;
        }
        .ai-card:hover .ai-preview video {
            transform: scale(1.06);
            opacity: .95;
        }
        .ai-preview::before,
        .ai-preview::after {
            content: "";
            position: absolute;
            inset: 14%;
            border: 1px solid rgba(255,255,255,.18);
            border-radius: 50%;
            animation: ai-preview-drift 8s ease-in-out infinite;
        }
        .ai-preview::after {
            inset: 28%;
            animation-delay: -2.2s;
            border-color: rgba(216,185,122,.35);
        }
        @keyframes ai-preview-drift {
            0%, 100% { transform: translate3d(-4%, 3%, 0) scale(1); }
            50% { transform: translate3d(5%, -5%, 0) scale(1.08); }
        }
        .ai-scanline {
            position: absolute;
            inset: 0;
            background: linear-gradient(115deg, transparent 0%, transparent 42%, rgba(255,255,255,.12) 50%, transparent 58%, transparent 100%);
            transform: translateX(-100%);
            animation: ai-scan 5.5s ease-in-out infinite;
        }
        @keyframes ai-scan {
            0%, 38% { transform: translateX(-100%); }
            68%, 100% { transform: translateX(100%); }
        }
        .ai-index {
            color: transparent;
            -webkit-text-stroke: 1px rgba(216,185,122,.55);
        }
        .theme-light .ai-animation-section {
            background:
                radial-gradient(circle at 12% 18%, rgba(64,169,255,.16), transparent 28%),
                radial-gradient(circle at 86% 16%, rgba(216,185,122,.24), transparent 26%),
                linear-gradient(135deg, rgba(250,247,240,.98), rgba(244,239,229,.94) 45%, rgba(255,255,255,.98));
        }
        .theme-light .ai-card {
            background: rgba(255,255,255,.78) !important;
            border-color: rgba(17,24,39,.12) !important;
            color: #111827 !important;
            box-shadow: 0 24px 70px rgba(17,24,39,.08);
        }
        .capabilities-section {
            position: relative;
            overflow: hidden;
            background:
                radial-gradient(circle at var(--mx, 50%) var(--my, 40%), rgba(216,185,122,.12), transparent 28%),
                linear-gradient(135deg, #121212 0%, #080808 52%, #14110b 100%);
        }
        .capabilities-section::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(216,185,122,.055) 1px, transparent 1px),
                linear-gradient(90deg, rgba(216,185,122,.045) 1px, transparent 1px);
            background-size: 54px 54px;
            transform: translate3d(calc((var(--mx, 50%) - 50vw) * .012), calc((var(--my, 40%) - 40vh) * .012), 0);
            opacity: .55;
            pointer-events: none;
            animation: capability-grid-drift 18s linear infinite;
        }
        .capabilities-section::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(115deg, transparent 0%, transparent 44%, rgba(255,255,255,.045) 50%, transparent 56%, transparent 100%);
            transform: translateX(-100%);
            animation: capability-scan 7s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes capability-grid-drift {
            from { background-position: 0 0, 0 0; }
            to { background-position: 54px 54px, 54px 54px; }
        }
        @keyframes capability-scan {
            0%, 35% { transform: translateX(-100%); }
            65%, 100% { transform: translateX(100%); }
        }
        .capability-module {
            position: relative;
            min-height: 230px;
            transform-style: preserve-3d;
            transform: perspective(900px) rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg)) translateY(0) scale(1);
            border: 1px solid rgba(255,255,255,.1);
            background:
                linear-gradient(145deg, rgba(255,255,255,.07), rgba(255,255,255,.025)),
                #121212;
            box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 20px 60px rgba(0,0,0,.28);
            transition: transform .18s ease, border-color .35s ease, box-shadow .35s ease, background .35s ease;
            isolation: isolate;
            will-change: transform;
        }
        .capability-module::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--glow-x, 50%) var(--glow-y, 50%), rgba(216,185,122,.24), transparent 38%);
            opacity: 0;
            transition: opacity .35s ease;
            pointer-events: none;
            z-index: -1;
        }
        .capability-module::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(125deg, transparent 0%, rgba(255,255,255,.08) 42%, rgba(216,185,122,.18) 50%, rgba(255,255,255,.05) 58%, transparent 100%);
            opacity: 0;
            transform: translateZ(34px) translateX(-18%);
            transition: opacity .35s ease, transform .35s ease;
            pointer-events: none;
            border-radius: inherit;
        }
        .capability-module:hover {
            transform: perspective(900px) rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg)) translateY(-9px) scale(1.025);
            border-color: rgba(216,185,122,.62);
            box-shadow: 0 28px 80px rgba(216,185,122,.13), 0 20px 70px rgba(0,0,0,.35);
        }
        .capability-module:hover::before {
            opacity: 1;
        }
        .capability-module:hover::after {
            opacity: 1;
            transform: translateZ(34px) translateX(0);
        }
        .capability-depth {
            transform: translateZ(42px);
        }
        .capability-depth-soft {
            transform: translateZ(22px);
        }
        .capability-rail {
            position: absolute;
            inset-inline: 18px;
            bottom: 18px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(216,185,122,.8), transparent);
            transform: translateZ(30px) scaleX(.35);

                </div>
              </section>

              <SectionDivider text={copy.aiSection} />

              {/* AI ANIMATION VIDEOS */}
              <section id="ai-animation" className="ai-animation-section py-28 px-6 border-b border-white/5">
                <div className="ai-orbital-ring"></div>
                <div className="max-w-7xl mx-auto relative z-10">
                  <div className="grid lg:grid-cols-12 gap-10 items-end mb-14">
                    <motion.div
                      initial={{ opacity: 0, y: 30 }}
                      whileInView={{ opacity: 1, y: 0 }}
                      viewport={{ once: true, amount: .3 }}
                      transition={{ duration: .7 }}
                      className="lg:col-span-7"
                    >
                      <div className="text-[10px] font-black uppercase tracking-[0.45em] text-[#d8b97a] mb-5">
                        {copy.aiSection}
                      </div>
                      <h2 className="text-5xl md:text-8xl font-black uppercase leading-none text-white">
                        {copy.aiTitle}
                      </h2>
                    </motion.div>
                    <motion.p
                      initial={{ opacity: 0, y: 30 }}
                      whileInView={{ opacity: 1, y: 0 }}
                      viewport={{ once: true, amount: .3 }}
                      transition={{ duration: .7, delay: .1 }}
                      className="lg:col-span-5 text-sm md:text-base text-zinc-400 font-bold leading-relaxed"
                    >
                      {copy.aiLead}
                    </motion.p>
                  </div>

                  <div className="grid md:grid-cols-3 gap-5">
                    {copy.aiCards.map((item, i) => (
                      <motion.article
                        key={item.title}
                        initial={{ opacity: 0, y: 35 }}
                        whileInView={{ opacity: 1, y: 0 }}
                        viewport={{ once: true, amount: .25 }}
                        transition={{ duration: .65, delay: i * .08 }}
                        onClick={() => item.video && setSelectedVideo(item.video)}
                        className="ai-card rounded-lg overflow-hidden group cursor-pointer"
                      >
                        <div className="ai-preview">
                          {item.video && (
                            <video src={item.video} muted loop playsInline autoPlay preload="metadata" />
                          )}
                          <div className="ai-scanline"></div>
                          <div className="absolute inset-0 flex items-center justify-center">
                            <div className="play-badge w-16 h-16 rounded-full bg-[#d8b97a] text-black flex items-center justify-center group-hover:scale-110 transition-transform">
                              <Icons.Play />
                            </div>
                          </div>
                          <div className="absolute left-5 top-4 text-5xl font-black ai-index">
                            0{i + 1}
                          </div>
                        </div>
                        <div className="p-6">
                          <div className="text-[9px] font-black uppercase tracking-widest text-[#d8b97a] mb-3">
                            {item.meta}
                          </div>
                          <h3 className="text-2xl font-black uppercase mb-3">{item.title}</h3>
                          <p className="text-sm text-zinc-400 leading-relaxed">{item.detail}</p>
                        </div>
                      </motion.article>
                    ))}
                  </div>
                </div>
              </section>

              <SectionDivider text={copy.contactSection} />

              {/* --- CONTACT SECTION WITH STUDIO LIGHTS BACKGROUND --- */}
              <section id="contact" className="py-24 px-6 bg-[#080808] text-white relative contact-grid-paper overflow-hidden">
                
                {/* Dynamic Studio Lights Background Overlay */}
                <div className="studio-lights-bg animate-light-drift"></div>
                
                {/* Subtle Radial Vignette for the Background Image */}
                <div className="absolute inset-0 z-[2] bg-gradient-to-t from-[#080808] via-transparent to-[#080808]/50 pointer-events-none"></div>

                {/* Background Text Shadow */}
                <div className="absolute inset-0 flex items-center justify-center opacity-[0.02] select-none z-[3]">
                   <h2 className="text-[25vw] font-black tracking-tighter uppercase sketch-font">{isArabic ? "تواصل" : "CONNECT"}</h2>
                </div>

                <div className="max-w-7xl mx-auto relative z-10">
                  <div className="flex flex-col lg:flex-row gap-16 items-center">
                    
                    {/* Left Side: Animated Heading & Image */}
                    <div className="flex-1 relative flex flex-col items-center lg:items-start">
                       <div className="relative mb-12">
                          <motion.div 
                            initial={{ x: -100, opacity: 0 }}
                            whileInView={{ x: 0, opacity: 1 }}
                            transition={{ duration: 0.8, ease: "easeOut" }}
                            className="flex overflow-hidden"
                          >
                            <h2 className="text-7xl md:text-[9rem] font-black leading-none sketch-font text-white uppercase tracking-tighter whitespace-nowrap">
                              {Array.from(copy.contactTitle).map((char, i) => (
                                <motion.span 
                                  key={i} 
                                  animate={{ y: [0, -10, 0] }} 
                                  transition={{ repeat: Infinity, duration: 2, delay: i * 0.1 }}
                                  className="inline-block"
                                >
                                  {char}
                                </motion.span>
                              ))}
                            </h2>
                          </motion.div>
                          
                          {/* Pins and Sticky Notes (Darkened) */}
                          <motion.div 
                            initial={{ x: 20, y: -20, rotate: 10, opacity: 0 }}
                            whileInView={{ x: 0, y: 0, rotate: -5, opacity: 1 }}
                            className="absolute -top-24 -right-10 w-32 h-32 bg-zinc-800 sticky-note p-4 text-xs font-bold text-zinc-300 flex flex-col justify-between border border-white/10"
                          >
                             <div className="w-4 h-4 pin-red absolute -top-2 left-1/2 -translate-x-1/2"></div>
                             <p>{copy.sticky}</p>
                             <p className="text-[8px] opacity-50 text-[#d8b97a]">#CreativeVision</p>
                          </motion.div>

                          <div className="absolute top-1/2 left-1/2 w-6 h-6 pin-red -translate-x-1/2 -translate-y-1/2 hidden md:block"></div>
                       </div>

                       {/* Profile Image Integration */}
                       <div className="relative group">
                          <motion.div 
                            initial={{ y: 50, opacity: 0 }}
                            whileInView={{ y: 0, opacity: 1 }}
                            className="relative z-10 w-64 md:w-80 overflow-hidden rounded-b-3xl"
                          >
                            
                          </motion.div>
                          {/* Sketch border effect */}
                          <div className="absolute -inset-4 border-2 border-dashed border-[#d8b97a]/30 rounded-full animate-[spin_20s_linear_infinite] opacity-50"></div>
                       </div>
                    </div>

                    {/* Right Side: Contact Details & Socials */}
                    <div className="flex-1 w-full relative z-[5]">
                       <div className="space-y-8">
                          {/* Direct Contact Card */}
                          <div className="magnetic-icon p-8 bg-zinc-900/80 backdrop-blur-md border-2 border-white/5 shadow-[8px_8px_0px_#d8b97a] rounded-xl transform hover:-translate-y-1 transition-transform">
                             <div className="flex items-center gap-4 mb-4 text-[#d8b97a]">
                                <Icons.Mail />
                                <h4 className="text-xl font-black uppercase tracking-widest">{copy.direct}</h4>
                             </div>
                             <a href="mailto:per.hisham@gmail.com" className="text-2xl md:text-3xl font-black hover:text-[#d8b97a] transition-colors break-words underline decoration-white/10 decoration-4 underline-offset-4">per.hisham@gmail.com</a>
                             
                             <div className="mt-8 pt-6 border-t-2 border-white/5 flex flex-col md:flex-row gap-6">
                                <div>
                                   <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1 flex items-center gap-2"><Icons.Phone /> KSA</p>
                                   <p className="font-black text-xl"></p>
                                </div>
                                <div>
                                   <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1 flex items-center gap-2"><Icons.Phone /> EGY</p>
                                   <p className="font-black text-xl"></p>
                                </div>
                                <div>
                                   <p className="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1 flex items-center gap-2"><Icons.Whatsapp /> WHATSAPP</p>
                                   <a href="https://wa.me/" target="_blank" className="font-black text-xl hover:text-[#d8b97a] transition-colors"></a>
                                </div>
                             </div>
                          </div>

                          {/* Social Platforms Grid */}
                          <div className="grid grid-cols-2 gap-4">
                             {[
                               { icon: <Icons.Linkedin />, label: 'LinkedIn', url: 'https://www.linkedin.com/in/hishamabdelhamed', color: 'hover:bg-[#0077b5]' },
                               { icon: <Icons.Instagram />, label: 'Instagram', url: 'https://www.instagram.com/hisham.abdlhamed?igsh=MTZwM3VsZWd1d2hxOA%3D%3D&utm_source=qrtarget=', color: 'hover:bg-[#e1306c]' },
                               { icon: <Icons.Facebook />, label: 'Facebook', url: 'https://facebook.com/hishamabdelhamedd', color: 'hover:bg-[#1877f2]' },
                               { icon: <Icons.Tiktok />, label: 'TikTok', url: 'https://www.tiktok.com/@hisham.abdelhamed', color: 'hover:bg-zinc-700' },
                               { icon: <Icons.Vimeo />, label: 'Vimeo', url: 'https://vimeo.com/hishamabdelhamed', color: 'hover:bg-[#17D5FF]' },
                               { icon: <Icons.Whatsapp />, label: 'WhatsApp', url: 'https://wa.me/', color: 'hover:bg-[#25D366]' },
                               
                             ].map((social, i) => (
                               <a key={i} href={social.url} target="_blank" className={`social-card relative overflow-hidden flex items-center justify-between p-6 bg-zinc-900/80 backdrop-blur-md border border-white/10 shadow-[4px_4px_0px_#111] rounded-xl group transition-all ${social.color} hover:shadow-none hover:translate-x-1 hover:translate-y-1`}>
                                  <div className="flex flex-col">
                                     <span className="text-[9px] font-black opacity-40 uppercase tracking-widest">{copy.connectOn}</span>
                                     <span className="font-black text-lg">{social.label}</span>
                                  </div>
                                  <div className="flex items-center gap-3 scale-125 group-hover:rotate-12 transition-transform">{social.icon}<Icons.Arrow /></div>
                               </a>
                             ))}
                          </div>
                       </div>
                    </div>
                  </div>
                </div>
              </section>

              {/* Video Modal */}
              <AnimatePresence>
                {selectedVideo && (
                  <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[110] bg-black/98 flex items-center justify-center p-4 backdrop-blur-xl">
                    <button onClick={() => setSelectedVideo(null)} className="absolute top-10 right-10 text-white hover:text-[#d8b97a]"><Icons.X /></button>
                    <div className="w-full max-w-5xl aspect-video rounded-3xl overflow-hidden shadow-2xl border border-white/10">
                      {isLocalVideo ? (
                        <video src={selectedVideo} className="w-full h-full bg-black" controls autoPlay playsInline />
                      ) : (
                        <iframe src={`${selectedVideo}?autoplay=1`} className="w-full h-full" frameBorder="0" allow="autoplay; fullscreen" allowFullScreen />
                      )}
                    </div>
                  </motion.div>
                )}
              </AnimatePresence>

              <footer className="py-12 text-center opacity-40 text-[9px] font-black tracking-[0.5em] uppercase border-t border-white/5 bg-black">
                {copy.footer}
              </footer>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
