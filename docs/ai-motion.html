<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="img/favicon.png">
<title>AI & Animation | Hesham Abdelhamed</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif
}

body{
background:#040405;
color:white;
overflow-x:hidden
}

/* BACKGROUND */

.ai-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;

background:
radial-gradient(circle at 20% 20%, rgba(245,193,74,.15), transparent 40%),
radial-gradient(circle at 80% 60%, rgba(0,120,255,.12), transparent 40%),
#020207;

animation:bgMove 18s infinite alternate ease-in-out
}

@keyframes bgMove{
0%{transform:scale(1)}
100%{transform:scale(1.1)}
}

/* NAVBAR (نفس index) */

.site-nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:20px;
padding:16px;
z-index:100;

overflow-x:auto;
white-space:nowrap;
background:rgba(0,0,0,.4);
backdrop-filter:blur(10px);
}

.site-nav a{
font-size:12px;
letter-spacing:.15em;
text-transform:uppercase;
color:white;
text-decoration:none;
opacity:.7;
flex-shrink:0;
}

.site-nav a:hover{opacity:1}

.site-nav a.active{
color:#f5c14a;
opacity:1
}

/* PAGE */

.page{
padding-top:140px; /* 👈 رفعنا المحتوى */
max-width:1200px;
margin:auto;
padding-left:20px;
padding-right:20px
}

/* HERO */

.hero{
margin-bottom:70px;
max-width:700px
}

.hero h1{
font-size:42px;
line-height:1.1;
margin-bottom:14px
}

.hero span{
color:#f5c14a
}

.hero p{
opacity:.85;
line-height:1.7;
font-size:14px
}

/* LIGHT DIVIDER */

.light-divider{
position:relative;
width:100%;
height:1px;
margin:60px 0;

background:linear-gradient(
90deg,
transparent,
rgba(255,255,255,0.2),
transparent
);

overflow:hidden
}

.light-divider::after{

content:"";

position:absolute;

top:0;
left:-40%;

width:40%;
height:100%;

background:linear-gradient(
90deg,
transparent,
rgba(245,193,74,0.9),
transparent
);

animation:lightSweep 4s linear infinite
}

@keyframes lightSweep{
0%{left:-40%}
100%{left:120%}
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px
}

.card{
border-radius:10px;
overflow:hidden;
cursor:pointer;
background:#07070c;
border:1px solid rgba(255,255,255,.06);
transition:.3s
}

.card:hover{
transform:translateY(-4px);
border-color:#f5c14a
}

/* الفيديو واضح 👇 */

.thumb{
position:relative;
width:100%;
padding-top:56%;
background:black;
}

.thumb video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
filter:brightness(1.05); /* 👈 أهم تعديل */
}

/* خففنا التعتيم 👇 */

.overlay{
position:absolute;
inset:0;
background:linear-gradient(to top,rgba(0,0,0,.4),transparent);
display:flex;
align-items:flex-end;
padding:10px
}

.label{
font-size:12px
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
display:none;
align-items:center;
justify-content:center;
z-index:200
}

.modal.open{
display:flex
}

.modal-frame{
width:90%;
max-width:1000px;
aspect-ratio:16/9;
background:black
}

.modal video{
width:100%;
height:100%;
object-fit:contain
}

.close{
position:absolute;
top:20px;
right:20px;
font-size:30px;
cursor:pointer
}

/* MOBILE */

@media(max-width:768px){

.grid{
grid-template-columns:repeat(2,1fr)
}

.hero h1{
font-size:32px
}

}

</style>

</head>

<body>

<div class="ai-bg"></div>

<nav class="site-nav">

<a href="index.html">Home</a>
<a href="my-work.html">My Work</a>
<a href="ai-motion.html" class="active">AI & Animation</a>
<a href="academy.html">Pro</a>
<a href="show.html">Showreel</a>

</nav>

<div class="page">

<section class="hero">

<h1>AI Motion & <span>Animated Worlds</span></h1>

<p>
A collection of AI-generated motion pieces, experimental animation,
and cinematic visual storytelling created through emerging technologies.
</p>

</section>

<div class="light-divider"></div>

<section>

<h2 style="margin-bottom:20px">AI Experiments & Animation</h2>

<div class="grid" id="videoGrid"></div>

</section>

</div>

<div class="modal" id="modal">

<div class="close" onclick="closeVideo()">×</div>

<div class="modal-frame" id="frame"></div>

</div>

<script>

/* VIDEO LIST */

const videos=[
"img/ai01.mp4","img/ai02.mp4","img/ai03.mp4","img/ai04.mp4",
"img/ai05.mp4","img/ai06.mp4","img/ai07.mp4","img/ai08.mp4"
]

const grid=document.getElementById("videoGrid")

videos.forEach((v,i)=>{

let card=document.createElement("div")
card.className="card"
card.onclick=()=>openVideo(i)

card.innerHTML=`
<div class="thumb">
<video muted loop playsinline preload="auto">
<source src="${v}" type="video/mp4">
</video>
<div class="overlay">
<div class="label">AI Scene ${i+1}</div>
</div>
</div>
`

grid.appendChild(card)

})

/* hover */

document.addEventListener("mouseover",(e)=>{
let card=e.target.closest(".card")
if(card){
let v=card.querySelector("video")
if(v) v.play()
}
})

document.addEventListener("mouseout",(e)=>{
let card=e.target.closest(".card")
if(card){
let v=card.querySelector("video")
if(v){
v.pause()
v.currentTime=0
}
}
})

/* modal */

function openVideo(i){
const modal=document.getElementById("modal")
const frame=document.getElementById("frame")

frame.innerHTML=`
<video controls autoplay>
<source src="${videos[i]}" type="video/mp4">
</video>
`

modal.classList.add("open")
}

function closeVideo(){
document.getElementById("modal").classList.remove("open")
document.getElementById("frame").innerHTML=""
}

</script>

</body>
</html>
