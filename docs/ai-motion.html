<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI & Animation | Hesham Abdelhamed</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif
}

body{
background:#020207;
color:white;
overflow-x:hidden
}

/* NAV */

.site-nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:20px;
padding:16px;
z-index:100;

overflow-x:auto;
white-space:nowrap;

background:rgba(0,0,0,.6);
backdrop-filter:blur(10px);
}

.site-nav a{
font-size:12px;
letter-spacing:.15em;
text-transform:uppercase;
color:white;
text-decoration:none;
opacity:.7;
}

.site-nav a.active{
color:#f5c14a;
opacity:1;
}

/* PAGE */

.page{
padding-top:160px; /* 👈 نزلنا العنوان */
max-width:1200px;
margin:auto;
padding-left:20px;
padding-right:20px;
}

/* HERO */

.hero{
margin-bottom:60px;
max-width:700px;
}

.hero h1{
font-size:32px;
margin-bottom:10px;
}

.hero p{
opacity:.8;
line-height:1.6;
font-size:14px;
}

/* CURSOR */

.cursor{
display:inline-block;
width:2px;
height:18px;
background:#f5c14a;
margin-left:5px;
animation:blink 1s infinite;
}

@keyframes blink{
0%,100%{opacity:1}
50%{opacity:0}
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
}

/* CARD */

.card{
position:relative;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:.3s;
background:black;
}

/* GLOW BORDER */

.card::before{
content:"";
position:absolute;
inset:0;
border-radius:12px;
padding:1px;
background:linear-gradient(120deg, transparent, #f5c14a, transparent);
-webkit-mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);
-webkit-mask-composite: xor;
mask-composite: exclude;
opacity:.3;
}

/* HOVER */

.card:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(245,193,74,.25);
}

/* VIDEO */

.thumb{
position:relative;
width:100%;
padding-top:56%;
}

.thumb video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

/* PLAY ICON */

.play{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:white;
background:rgba(0,0,0,.3);
opacity:.9;
}

/* LABEL */

.label{
position:absolute;
bottom:10px;
left:12px;
font-size:12px;
opacity:.8;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
display:none;
align-items:center;
justify-content:center;
z-index:200;
}

.modal.open{
display:flex;
}

.modal-frame{
width:90%;
max-width:1000px;
aspect-ratio:16/9;
}

.modal video{
width:100%;
height:100%;
}

/* FOOTER */

.footer{
margin-top:70px;
padding:25px;
text-align:center;
font-size:12px;
opacity:.5;
border-top:1px solid rgba(255,255,255,.1);
}

/* MOBILE */

@media(max-width:768px){

.grid{
grid-template-columns:repeat(2,1fr);
}

.hero h1{
font-size:26px;
}

}

</style>

</head>

<body>

<nav class="site-nav">
<a href="index.html">Home</a>
<a href="my-work.html">My Work</a>
<a href="ai-motion.html" class="active">AI & Animation</a>
<a href="academy.html">Pro</a>
<a href="show.html">Showreel</a>
</nav>

<div class="page">

<section class="hero">

<h1 id="typeTitle"></h1>

<p>
A curated collection of AI-driven motion pieces and experimental animation,
exploring new forms of cinematic storytelling and visual expression.
</p>

</section>

<div class="grid" id="videoGrid"></div>

</div>

<div class="modal" id="modal">
<div class="modal-frame" id="frame"></div>
</div>

<footer class="footer">
© 2026 Hesham Abdelhamed — All Rights Reserved
</footer>

<script>

/* TYPEWRITER */

const text="AI Motion & Animated Worlds"
let i=0

function type(){
if(i<text.length){
document.getElementById("typeTitle").innerHTML+=text[i]
i++
setTimeout(type,30)
}else{
document.getElementById("typeTitle").innerHTML+='<span class="cursor"></span>'
}
}

type()

/* VIDEOS */

const videos=[
"img/ai01.mp4",
"img/ai02.mp4",
"img/ai03.mp4",
"img/ai04.mp4",
"img/ai05.mp4",
"img/ai06.mp4",
"img/ai07.mp4",
"img/ai08.mp4"
]

const grid=document.getElementById("videoGrid")

videos.forEach((v,i)=>{

let card=document.createElement("div")
card.className="card"
card.onclick=()=>openVideo(i)

card.innerHTML=`

<div class="thumb">

<video autoplay muted loop playsinline>
<source src="${v}" type="video/mp4">
</video>

<div class="play">▶</div>

<div class="label">AI Scene ${i+1}</div>

</div>

`

grid.appendChild(card)

})

/* MODAL */

function openVideo(i){

const modal=document.getElementById("modal")
const frame=document.getElementById("frame")

frame.innerHTML=`
<video controls autoplay>
<source src="${videos[i]}" type="video/mp4">
</video>
`

modal.classList.add("open")
}

</script>

</body>
</html>
