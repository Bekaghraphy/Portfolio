<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI & Animation | Hesham Abdelhamed</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif}
body{background:#040405;color:#fff;overflow-x:hidden}

/* NAVBAR */
.site-nav{
position:fixed;top:24px;left:0;right:0;display:flex;justify-content:center;gap:30px;z-index:100
}
.site-nav a{
font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#fff;text-decoration:none;opacity:.7
}
.site-nav a:hover{opacity:1}
.site-nav a.active{color:#f5c14a;opacity:1}

/* AI BACKGROUND */
.ai-bg{
position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;
background:
radial-gradient(circle at 20% 20%, rgba(245,193,74,.15), transparent 40%),
radial-gradient(circle at 80% 60%, rgba(0,120,255,.12), transparent 40%),
#020207;
animation:bgMove 18s infinite alternate ease-in-out;
}
@keyframes bgMove{0%{transform:scale(1)}100%{transform:scale(1.15)}}

/* PAGE */
.page{padding-top:140px;max-width:1200px;margin:auto;padding:0 20px}

/* HERO */
.hero{
display:grid;grid-template-columns:1.5fr 1fr;gap:40px;margin-bottom:60px;align-items:center
}
.hero h1{font-size:42px;margin-bottom:14px}
.hero span{color:#f5c14a}
.hero p{opacity:.85;line-height:1.7;font-size:15px}

/* FEATURE PLAYER */
.feature{
height:220px;display:flex;align-items:center;justify-content:center;border-radius:14px;
border:1px solid rgba(255,255,255,.15);cursor:pointer;position:relative;transition:.3s
}
.feature:hover{border-color:#f5c14a}

/* PLAY RING */
.play-ring{position:relative;width:120px;height:120px;display:flex;align-items:center;justify-content:center}
.play-ring::before{
content:"";position:absolute;width:120px;height:120px;border-radius:50%;
border:2px solid rgba(255,255,255,.2);border-top:2px solid #f5c14a;
animation:spin 3s linear infinite
}
.play-ring::after{
content:"";position:absolute;width:120px;height:120px;border-radius:50%;
border:1px solid rgba(255,255,255,.15);animation:pulse 2.5s infinite
}
.play-circle{
width:70px;height:70px;border-radius:50%;border:1px solid rgba(255,255,255,.6);
display:flex;align-items:center;justify-content:center;font-size:22px;transition:.3s
}
.feature:hover .play-circle{background:#f5c14a;color:#000;border-color:#f5c14a}

@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
@keyframes pulse{0%{transform:scale(1);opacity:.6}70%{transform:scale(1.3);opacity:0}100%{opacity:0}}

/* GRID */
.grid{
display:grid;grid-template-columns:repeat(4,1fr);gap:22px;margin-top:20px
}
.card{
border-radius:12px;overflow:hidden;cursor:pointer;background:#07070c;
border:1px solid rgba(255,255,255,.08);transition:.35s
}
.card:hover{
transform:translateY(-6px) scale(1.03);
box-shadow:0 20px 60px rgba(0,0,0,.9);
border-color:#f5c14a
}

.thumb{position:relative;width:100%;padding-top:56%}
.thumb video{
position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover
}

.overlay{
position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85),transparent);
display:flex;align-items:flex-end;padding:12px
}
.label{font-size:13px}

/* MODAL */
.modal{
position:fixed;inset:0;background:rgba(0,0,0,.92);
display:none;align-items:center;justify-content:center;z-index:200
}
.modal.open{display:flex}

.modal-frame{
width:90%;max-width:1100px;aspect-ratio:16/9;background:black
}
.modal video{width:100%;height:100%;object-fit:contain}

.close{
position:absolute;top:30px;right:40px;font-size:32px;cursor:pointer
}

/* MOBILE */
@media(max-width:900px){
.hero{grid-template-columns:1fr}
.grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

<body>

<div class="ai-bg"></div>

<nav class="site-nav">
<a href="index.html">Home</a>
<a href="my-work.html">My Work</a>
<a href="ai-motion.html" class="active">AI & Animation</a>
<a href="show.html">Showreel</a>
</nav>

<div class="page">

<section class="hero">

<div>
<h1>AI Motion & <span>Animated Worlds</span></h1>
<p>
A collection of AI-generated motion pieces, experimental animation,
and cinematic visual storytelling created through emerging technologies.
</p>
</div>

</section>

<section>
<h2 style="margin-bottom:20px">AI Experiments & Animation</h2>
<div class="grid" id="videoGrid"></div>
</section>

</div>

<div class="modal" id="modal">
<div class="close" onclick="closeVideo()">×</div>
<div class="modal-frame" id="frame"></div>
</div>

<script>

/* ضع روابط الفيديوهات هنا (MP4 من مجلد img أو videos) */
const videos=[

"img/ai01.mp4",
"img/ai02.mp4",
"img/ai03.mp4",
"img/ai04.mp4",
"img/ai05.mp4",
"img/ai06.mp4",
"img/ai07.mp4",
"img/ai08.mp4"

]

const grid=document.getElementById("videoGrid")

videos.forEach((v,i)=>{

let card=document.createElement("div")
card.className="card"
card.onclick=()=>openVideo(i)

card.innerHTML=`

<div class="thumb">

<video muted loop playsinline preload="metadata">

<source src="${v}" type="video/mp4">

</video>

<div class="overlay">

<div class="label">AI Scene ${i+1}</div>

</div>

</div>

`

grid.appendChild(card)

})

/* Hover preview */

document.addEventListener("mouseover",(e)=>{

let card=e.target.closest(".card")

if(card){

let v=card.querySelector("video")

if(v) v.play()

}

})

document.addEventListener("mouseout",(e)=>{

let card=e.target.closest(".card")

if(card){

let v=card.querySelector("video")

if(v){

v.pause()
v.currentTime=0

}

}

})

/* Modal player */

function openVideo(i){

const modal=document.getElementById("modal")
const frame=document.getElementById("frame")

frame.innerHTML=`

<video controls autoplay>

<source src="${videos[i]}" type="video/mp4">

</video>

`

modal.classList.add("open")

}

function closeVideo(){

document.getElementById("modal").classList.remove("open")
document.getElementById("frame").innerHTML=""

}

</script>

</body>
</html>
