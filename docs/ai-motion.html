<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="img/favicon.png">
<title>AI & Animation | Hesham Abdelhamed</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif
}

body{
background:#040405;
color:white;
overflow-x:hidden
}

/* BACKGROUND */

.ai-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;

background:
radial-gradient(circle at 20% 20%, rgba(245,193,74,.15), transparent 40%),
radial-gradient(circle at 80% 60%, rgba(0,120,255,.12), transparent 40%),
#020207;
}

/* NAV */

.site-nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:20px;
padding:16px;
z-index:100;
overflow-x:auto;
white-space:nowrap;
background:rgba(0,0,0,.4);
backdrop-filter:blur(10px);
}

.site-nav a{
font-size:12px;
letter-spacing:.15em;
text-transform:uppercase;
color:white;
text-decoration:none;
opacity:.7;
flex-shrink:0;
}

.site-nav a.active{
color:#f5c14a;
opacity:1;
}

/* PAGE */

.page{
padding-top:110px;
max-width:1200px;
margin:auto;
padding:0 20px;
}

/* HERO */

.hero{
margin-bottom:60px;
max-width:700px;
}

.hero h1{
font-size:34px;
margin-bottom:12px;
}

.hero span{
color:#f5c14a;
}

.hero p{
opacity:.85;
line-height:1.7;
font-size:14px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:16px;
}

.card{
border-radius:10px;
overflow:hidden;
cursor:pointer;
background:#07070c;
border:1px solid rgba(255,255,255,.06);
}

/* VIDEO THUMB */

.thumb{
position:relative;
width:100%;
padding-top:56%;
}

.thumb video{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

/* PLAY ICON */

.play{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
background:rgba(0,0,0,.3);
opacity:0;
transition:.3s;
}

.card:hover .play{
opacity:1;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
display:none;
align-items:center;
justify-content:center;
z-index:200;
}

.modal.open{
display:flex;
}

.modal-frame{
width:90%;
max-width:1000px;
aspect-ratio:16/9;
background:black;
}

.modal video{
width:100%;
height:100%;
}

/* FOOTER */

.footer{
margin-top:70px;
padding:25px;
text-align:center;
font-size:12px;
opacity:.5;
border-top:1px solid rgba(255,255,255,.1);
}

/* MOBILE */

@media(max-width:768px){

.grid{
grid-template-columns:repeat(2,1fr);
}

.hero h1{
font-size:28px;
}

}

</style>

</head>

<body>

<div class="ai-bg"></div>

<nav class="site-nav">

<a href="index.html">Home</a>
<a href="my-work.html">My Work</a>
<a href="ai-motion.html" class="active">AI & Animation</a>
<a href="academy.html">Pro</a>
<a href="show.html">Showreel</a>

</nav>

<div class="page">

<section class="hero">

<h1 id="typeTitle"></h1>

<p>
A curated collection of AI-driven motion pieces and experimental animation,
exploring new forms of cinematic storytelling and visual expression.
</p>

</section>

<section>

<div class="grid" id="videoGrid"></div>

</section>

</div>

<div class="modal" id="modal">
<div class="modal-frame" id="frame"></div>
</div>

<footer class="footer">
© 2026 Hesham Abdelhamed — All Rights Reserved
</footer>

<script>

/* TYPEWRITER */

const text="AI Motion & Animated Worlds"
let i=0

function type(){
if(i<text.length){
document.getElementById("typeTitle").innerHTML+=text[i]
i++
setTimeout(type,35)
}
}

type()

/* VIDEOS */

const videos=[
"img/ai01.mp4",
"img/ai02.mp4",
"img/ai03.mp4",
"img/ai04.mp4",
"img/ai05.mp4",
"img/ai06.mp4",
"img/ai07.mp4",
"img/ai08.mp4"
]

const grid=document.getElementById("videoGrid")

videos.forEach((v,i)=>{

let card=document.createElement("div")
card.className="card"
card.onclick=()=>openVideo(i)

card.innerHTML=`

<div class="thumb">

<video muted playsinline preload="metadata">

<source src="${v}" type="video/mp4">

</video>

<div class="play">▶</div>

</div>

`

grid.appendChild(card)

})

/* PREVIEW */

document.addEventListener("mouseover",(e)=>{

let card=e.target.closest(".card")

if(card){
let v=card.querySelector("video")
if(v){
v.currentTime=1
v.play()
}
}

})

document.addEventListener("mouseout",(e)=>{

let card=e.target.closest(".card")

if(card){
let v=card.querySelector("video")
if(v){
v.pause()
v.currentTime=0
}
}

})

/* MODAL */

function openVideo(i){

const modal=document.getElementById("modal")
const frame=document.getElementById("frame")

frame.innerHTML=`
<video controls autoplay>
<source src="${videos[i]}" type="video/mp4">
</video>
`

modal.classList.add("open")
}

</script>

</body>
</html>
